services:
  postgres:
    image: postgres:16-alpine
    container_name: painel-postgres
    environment:
      POSTGRES_DB: painel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d painel"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    container_name: painel-backend
    environment:
      NODE_ENV: development
      PORT: 3333
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/painel
    command: sh -c "npm ci && npm run dev"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data:ro
      - ./backend/node_modules:/app/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3333:3333"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3333
    container_name: painel-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3333
    command: sh -c "npm ci && npm run dev -- -H 0.0.0.0"
    volumes:
      - ./frontend:/app/frontend
      - ./frontend/node_modules:/app/frontend/node_modules
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data: